<!DOCTYPE html>
<html>
<head>
    <title>K-Electric Bill Generator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
       <div class="bill-container">

    <h2>🏠 K-Electric Bill Generator</h2>
    
    <label>Customer Name:</label>
    <input type="text" id="customerName" placeholder="Enter your name" required>
    
    <label>Number of Units:</label>
    <input type="number" id="units" placeholder="Enter units consumed" required>
    
    <label>Charges per Unit (Rs):</label>
    <input type="number" id="chargesPerUnit" placeholder="e.g. 25.50" step="0.01" value="25.50">
    
    <label>Late Payment Surcharge (Rs):</label>
    <input type="number" id="lateSurcharge" placeholder="e.g. 500" step="0.01" value="500">
    
    <button onclick="generateBill()" class="button_bill ">Generate Bill & View</button>
    </div>
 <script  src="app.js"></script>
</body>
</html>
